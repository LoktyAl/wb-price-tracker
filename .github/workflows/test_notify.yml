name: Test Telegram Notification

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message
        run: |
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="WB Price Tracker test OK!" -d parse_mode="HTML")
          echo "Response: $RESPONSE"
          echo $RESPONSE | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('ok') else 1)"
